<div class="container-fluid bg-light min-vh-100 p-0">
  <!-- Header Section -->
  <div class="bg-white p-3 shadow-sm border-bottom">
    <div class="d-flex align-items-center mb-1">
      <i class="bi bi-arrow-left fs-4 me-3 text-dark" style="cursor: pointer;" (click)="goBack()"></i>
      <div>
        <h6 class="fw-bold m-0">Select boarding & dropping points</h6>
        <p class="text-muted small m-0">{{ fromCity }} <i class="bi bi-arrow-right mx-1"></i> {{ toCity }}</p>
      </div>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="bg-white d-flex text-center border-bottom sticky-top">
    <div class="flex-fill p-3 border-bottom border-3 pointer" 
         [class.border-danger]="activeTab === 'boarding'"
         (click)="activeTab = 'boarding'">
      <div class="fw-bold small text-uppercase" [class.text-danger]="activeTab === 'boarding'">Boarding points</div>
      <div class="text-muted small">{{ fromCity }}</div>
    </div>
    <div class="flex-fill p-3 border-bottom border-3 pointer" 
         [class.border-danger]="activeTab === 'dropping'"
         (click)="activeTab = 'dropping'">
      <div class="fw-bold small text-uppercase" [class.text-danger]="activeTab === 'dropping'">Dropping points</div>
      <div class="text-muted small">{{ toCity }}</div>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div *ngIf="isLoading" class="text-center p-5">
    <div class="spinner-border text-danger" role="status"></div>
    <p class="mt-2 text-muted">Fetching points...</p>
  </div>

  <!-- Points List -->
  <div class="p-3" *ngIf="!isLoading">
    <div class="bg-white shadow-sm rounded-4 overflow-hidden border">
      <div class="p-3 border-bottom bg-light">
        <span class="text-muted small fw-bold">All {{ activeTab }} points in {{ activeTab === 'boarding' ? fromCity : toCity }}</span>
      </div>

      <div class="list-group list-group-flush">
        <label *ngFor="let point of (activeTab === 'boarding' ? boardingPoints : droppingPoints)" 
               class="list-group-item p-3 border-0 border-bottom pointer">
          <div class="d-flex justify-content-between align-items-start">
            <div class="d-flex gap-3">
              <span class="fw-bold text-dark fs-6">{{ formatTimeTo12Hour(point.time) }}</span>
              <div>
                <div class="fw-bold text-dark">{{ point.pointName }}</div>
                <div class="text-muted small mb-2">{{ point.address }}</div>
                <span *ngIf="point.isPopular" class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-2 py-1" style="font-size: 10px;">
                  Popular {{ activeTab }} point
                </span>
              </div>
            </div>
            <input type="radio" 
                   name="pointSelection" 
                   class="form-check-input border-secondary fs-5" 
                   [checked]="activeTab === 'boarding' ? selectedBoarding?.pointId === point.pointId : selectedDropping?.pointId === point.pointId"
                   (change)="onSelectPoint(point)">
          </div>
        </label>
      </div>
    </div>
  </div>

  <!-- Fixed Bottom Footer -->
  <div class="fixed-bottom bg-white border-top p-3 shadow-lg" *ngIf="selectedBoarding && selectedDropping">
    <div class="container d-flex justify-content-between align-items-center">
      <div>
        <div class="text-muted small">Total amount</div>
        <h4 class="fw-bold text-success m-0">₹{{ totalPrice }}</h4>
      </div>
      <button class="btn btn-danger btn-lg px-5 rounded-pill fw-bold shadow-sm" (click)="proceedToPassengerDetails()">
        Proceed
      </button>
    </div>
  </div>
</div>
