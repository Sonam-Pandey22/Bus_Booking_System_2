<div class="login-container d-flex align-items-center justify-content-center">
  <div class="login-card p-4 p-md-5 shadow-lg rounded-4 bg-white text-center">

    <div class="mb-4">
      <div class="bus-icon-circle mb-2 mx-auto">
        <i class="fa fa-bus fa-2x text-primary"></i>
      </div>
      <h2 class="fw-bold text-primary mb-1">BusBook</h2>
      <p class="text-muted small">Safe, comfortable, and affordable travel</p>
    </div>


    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <div class="mb-3 text-start">

        <label class="custom-label">Email</label>

        <div class="custom-input-group">

          <span class="input-icon"><i class="bi bi-envelope"></i></span>

          <input type="email" class="custom-input" formControlName="email" placeholder="Enter your email">

        </div>

        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-danger small mt-1">

          Please enter a valid email address.

        </div>

      </div>



      <div class="mb-3">

        <label class="custom-label">Password</label>

        <div class="custom-input-group">

          <span class="input-icon"><i class="bi bi-lock"></i></span>

          <input type="password" class="custom-input" formControlName="password" placeholder="Enter your password">

        </div>

        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-danger small mt-1">

          Password is required.

        </div>

      </div>


      <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold mb-3 shadow">

        Login

      </button>

      <div class="text-center mt-3">
        <span>Don't have an account? </span>
        <a routerLink="/register" class="text-primary fw-bold" style="cursor: pointer; text-decoration: none;">
          Register here
        </a>
      </div>
    </form>
  </div>
</div>
